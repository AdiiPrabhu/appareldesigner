<!DOCTYPE html>
<html lang="en" style="background: #0f0f13;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: http://localhost:*; connect-src 'self' http://localhost:* ws://localhost:*;" />
    <title>Apparel Design Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* Prevent flash of unstyled content */
      html, body, #root {
        background-color: #0f0f13;
        color: #e8e8f0;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        font-family: 'Inter', system-ui, sans-serif;
      }
      /* Loading placeholder */
      #root:empty::after {
        content: '';
        display: block;
        width: 40px;
        height: 40px;
        border: 3px solid #2a2a3a;
        border-top-color: #6c63ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      @keyframes spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
